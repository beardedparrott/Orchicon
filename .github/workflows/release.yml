# Orchicon release workflow.
#
# Builds the control-plane binary for Linux, macOS, and Windows (amd64
# + arm64), packages them as tar.gz/zip with the naming convention the
# install scripts expect, and creates a GitHub Release. The frontend is
# built and embedded so the binary serves the SPA in production mode
# (docs/10 §9). Triggers on version tags (v*.*.*).
#
# The install scripts (scripts/install.sh, scripts/install.ps1) download
# these release assets. When a phase adds new runtime components that
# need to ship in the binary, update the build step here and verify the
# install scripts still work end-to-end (AGENTS.md §Install Scripts).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            archive: tar.gz
          - os: linux
            arch: arm64
            archive: tar.gz
          - os: darwin
            arch: amd64
            archive: tar.gz
          - os: darwin
            arch: arm64
            archive: tar.gz
          - os: windows
            arch: amd64
            archive: zip
          - os: windows
            arch: arm64
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          ORCHICON_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          VERSION="${ORCHICON_VERSION}"
          LDFLAGS="-X github.com/beardedparrott/orchicon/internal/version.gitCommit=$(git rev-parse --short HEAD) \
                   -X github.com/beardedparrott/orchicon/internal/version.gitTag=${VERSION} \
                   -X github.com/beardedparrott/orchicon/internal/version.buildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          go build -ldflags "$LDFLAGS" -o "orchicon${EXT}" ./cmd/orchicon

      - name: Package
        env:
          ORCHICON_VERSION: ${{ inputs.version || github.ref_name }}
        run: |
          VERSION="${ORCHICON_VERSION}"
          VERSION_NUM="${VERSION#v}"
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          ASSET="orchicon_${VERSION_NUM}_${{ matrix.os }}_${{ matrix.arch }}"
          mkdir -p "$ASSET"
          cp "orchicon${EXT}" "$ASSET/"
          cp README.md "$ASSET/" 2>/dev/null || true
          cp LICENSE "$ASSET/" 2>/dev/null || true
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar -czf "${ASSET}.tar.gz" "$ASSET"
          else
            zip -r "${ASSET}.zip" "$ASSET"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: orchicon-${{ matrix.os }}-${{ matrix.arch }}
          path: orchicon_*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          VERSION="${{ inputs.version || github.ref_name }}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine version tag (no input, no ref_name)"
            exit 1
          fi
          # Ensure the tag exists locally and points at HEAD — the
          # auto-release workflow creates the tag in its own job, but
          # manual dispatches (workflow_dispatch) don't always have
          # fetch-tags: true for tags created in a separate run. Pull
          # the tag from origin if we don't have it, or recreate it
          # pointing at the merge commit.
          if ! git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "Tag ${VERSION} not found locally; fetching from origin"
            git fetch --tags origin
          fi
          if ! git rev-parse -q --verify "refs/tags/${VERSION}" >/dev/null; then
            echo "::error::Tag ${VERSION} does not exist on origin either"
            exit 1
          fi
          # Build a list of asset files. softprops/action-gh-release
          # had a couple of transient API failures under load (one
          # step returned in <1s with no output — typically a 422
          # from a stale release-name collision), so we use
          # `gh release create` directly: it's the same primitive the
          # action calls, but with explicit retry and clearer errors.
          ASSETS=$(find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) | sort)
          if [ -z "$ASSETS" ]; then
            echo "::error::No release assets found under artifacts/"
            exit 1
          fi
          echo "Uploading ${ASSETS} to release ${VERSION}"
          # Delete any pre-existing release for this tag (stale partial
          # releases from earlier failed runs would otherwise 422 the
          # create call).
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "Release ${VERSION} already exists — deleting before re-create"
            gh release delete "${VERSION}" --yes
          fi
          # Create the release. The `--generate-notes` flag mirrors the
          # previous action's behavior (GitHub auto-generates the body
          # from PR titles + commit messages since the last release).
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --generate-notes \
            --draft=false \
            $ASSETS
          echo "Release ${VERSION} created with $(echo "$ASSETS" | wc -l) assets"
