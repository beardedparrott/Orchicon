# Orchicon auto-release workflow.
#
# When a PR with the "release" label is merged to main, this workflow
# bumps the patch version, creates a tag, and dispatches release.yml
# to build and publish the GitHub Release assets.
#
# We use workflow_dispatch (not tag-push chaining) because the default
# GITHUB_TOKEN blocks recursive workflow triggers — a tag push from one
# workflow will not fire another workflow's push:tags trigger.
#
# In early development all PRs carry the "release" label so every merge
# produces a release. Update the trigger condition if you want a more
# selective release cadence later.

name: Auto Release

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  actions: write

jobs:
  tag-and-release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Determine next version and create tag
        id: version
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.1.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "Bumping from ${LATEST_TAG:-<none>} to ${NEW_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yml \
            --ref main \
            --field version="${{ steps.version.outputs.tag }}"
