# wrangler.toml — CloudFlare Pages build config for orchicon.dev
#
# Pages project metadata. Pages projects do NOT support a [build]
# section in wrangler.toml (that's a Workers-only field) — the build
# command and other build settings live in the CloudFlare dashboard.
# This file documents the deploy-time contract: project name, build
# output directory, and compatibility date.
#
# Configure the GitHub integration in the CloudFlare dashboard
# (Workers & Pages → orchicon-site → Settings → Builds):
#   - Build command:        bash scripts/build-site.sh
#   - Build output dir:     site
#   - Root directory:       (leave blank = repo root)
#   - Environment variables: none required
#
# If you change the build approach, mirror it here and in
# CLOUDFLARE_SETUP.md (single source of truth for the deploy recipe).

name = "orchicon-site"
compatibility_date = "2024-09-23"
pages_build_output_dir = "site"
