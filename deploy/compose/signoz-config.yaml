# SigNoz query-service config (telemetry plane backend).
# See docs/01_Architecture_Vision.md §3 and docs/08 §5.
# Minimal config — the signoz image auto-detects ClickHouse via env vars.

# ClickHouse storage for traces/metrics/logs.
clickhouse:
  host: clickhouse
  port: 9000
  user: signoz
  password: signoz
  database: signoz

# Where the frontend and API are served.
http:
  host: 0.0.0.0
  port: 3301

# Disable authentication for local dev (handled via env vars in docker-compose).
auth:
  enabled: false

# Root user config for impersonation auth (no login screen).
user:
  root:
    enabled: true
    email: "admin@orchicon.local"
    password: "orchicon-dev"
    org:
      name: "default"
      id: ""

# IdentN config for impersonation auth.
identn:
  impersonation:
    enabled: true
  tokenizer:
    enabled: false
  apikey:
    enabled: false
