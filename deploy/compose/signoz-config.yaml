# SigNoz query-service config (telemetry plane backend).
# See docs/01_Architecture_Vision.md §3 and docs/08 §5.
# Minimal config — the signoz image auto-detects ClickHouse via env vars.

# ClickHouse storage for traces/metrics/logs.
clickhouse:
  host: clickhouse
  port: 9000
  user: signoz
  password: signoz
  database: signoz

# Where the frontend and API are served.
http:
  host: 0.0.0.0
  port: 3301

# Disable authentication for local dev (enterprise version ignores
# SIGNOZ_AUTH_ENABLED env var). Without this, the embedded iframe
# shows a login page because the iframe can't share the auth cookie.
auth:
  enabled: false
