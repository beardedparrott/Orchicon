# OTel collector config for the Orchicon telemetry plane.
#
# Receives OTLP (gRPC + HTTP) from the control plane and frontend,
# exports to ClickHouse (SigNoz). Telemetry is fully separated from
# control state (docs/01 §3, docs/08 §5). The control plane never
# owns this infrastructure.
#
# Per docs/08 §5.1, canonical spans include api.<service>.<rpc>,
# reconcile.<kind>.<id>, dispatch.<task_id>, adapter.execute.*,
# recovery.*, and gateway.* — all flow through this collector.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  # Drop high-volume adapter transcripts (docs/08 §5.3) — they are
  # stored as artifacts, not OTel logs. Keep ClickHouse log volume bounded.
  memory_limiter:
    check_interval: 2s
    limit_percentage: 80
    spike_limit_percentage: 25

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000
    database: signoz
    username: signoz
    password: signoz
    ttl_days: 7
    traces_table_name: signoz_traces
    metrics_table_name: signoz_metrics
    logs_table_name: signoz_logs
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 10s
      max_elapsed_time: 1m

service:
  telemetry:
    logs:
      level: info
  extensions:
    health_check:
      endpoint: 0.0.0.0:13133
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouse]

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
