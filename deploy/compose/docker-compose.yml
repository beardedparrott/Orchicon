# Orchicon local development stack — 2 containers by default.
#
# Per docs/01_Architecture_Vision.md §3, the local-dev deployment runs
# the control plane plus all dependencies on one machine:
#   - PostgreSQL 16 (source of truth, RLS, advisory locks)
#   - NATS JetStream (event bus, docs/08 §2)
#   - OTel collector → SigNoz/ClickHouse (fully separated telemetry
#     plane, docs/01 §3, docs/08 §5)
#
# Default profile (no flag): postgres + nats.
# Telemetry profile: clickhouse + schema migrator + otel-collector + signoz.
#
# The telemetry stack is opt-in via a Docker Compose profile so that
# the common dev loop (editing API handlers, reconcilers, UI) does not
# need to start the full SigNoz/ClickHouse stack. The control plane
# gracefully degrades when telemetry is absent (docs/08 §8).
#
# Start with telemetry:  make up-telemetry
#   (or: docker compose --profile telemetry -f deploy/compose/docker-compose.yml up -d)
#
# Containers eliminated from the standard SigNoz stack:
#   - ZooKeeper: ClickHouse's built-in Keeper (embedded RAFT-based
#     coordination) replaces the separate ZooKeeper container.
#   - Depends_on chains relaxed: the schema migrator, OTel collector,
#     and SigNoz query-service all start asynchronously so the stack
#     becomes available faster — no container waits on the schema
#     migrator completing before starting.
#
# Start:      make up         (postgres + nats only)
# Stop:       make down
# Reset:      make nuke
#
# The control plane itself runs from source (`make run`) and connects
# to these services. SigNoz UI (when telemetry profile active):
# http://localhost:3301
#
# NOTE: SigNoz's internal API uses :8081 here to avoid clashing with
# the Orchicon control plane on :8080.

services:
  postgres:
    image: postgres:16-alpine
    container_name: orchicon-postgres
    environment:
      POSTGRES_USER: orchicon
      POSTGRES_PASSWORD: orchicon
      POSTGRES_DB: orchicon
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchicon -d orchicon"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    container_name: orchicon-nats
    command: >
      nats-server
      --js
      --store_dir /data
      -m 8222
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # ClickHouse is the storage backend for SigNoz (telemetry plane).
  # Uses its built-in ClickHouse Keeper (embedded RAFT coordination)
  # instead of a separate ZooKeeper container, reducing the stack by
  # one container and avoiding the ZooKeeper startup delay.
  #
  # Part of the "telemetry" profile — not started by default.
  # Start with: docker compose --profile telemetry up -d
  clickhouse:
    profiles: ["telemetry"]
    image: clickhouse/clickhouse-server:25.8
    container_name: orchicon-clickhouse
    environment:
      CLICKHOUSE_DB: signoz
      CLICKHOUSE_USER: signoz
      CLICKHOUSE_PASSWORD: signoz
    ports:
      - "9000:9000"   # native
      - "8123:8123"   # http
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      # The `00-` prefix orders this file before any image-default config
      # files in config.d/ (e.g. docker_related_config.xml) and avoids
      # path collisions with anything the image might create. The cluster
      # "cluster" defined here is what the schema migrator and query-
      # service reference via --dsn on CLUSTER 'cluster'.
      - ./clickhouse-cluster.xml:/etc/clickhouse-server/config.d/00-cluster.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  # SigNoz schema migrator — one-shot init container that creates the
  # ClickHouse databases (signoz_traces, signoz_metrics, signoz_logs)
  # before the collector and query-service start. The default
  # --cluster-name "cluster" matches what 00-cluster.xml defines in
  # ClickHouse, so DDL with ON CLUSTER 'cluster' resolves correctly.
  signoz-schema-migrator:
    profiles: ["telemetry"]
    image: signoz/signoz-schema-migrator:latest
    container_name: orchicon-signoz-schema-migrator
    command: ["--dev", "sync", "--dsn=tcp://signoz:signoz@clickhouse:9000", "--up="]
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  # OTel collector receives OTLP from the control plane (and frontend)
  # and exports to ClickHouse. This is the boundary of the telemetry
  # plane (docs/08 §5). Control plane connects OTLP gRPC to :4317.
  #
  # The schema migrator is NOT in the depends_on chain — the collector
  # has retry_on_failure enabled and will reconnect once the schema is
  # ready. This lets telemetry infra start asynchronously while the
  # rest of the stack boots.
  otel-collector:
    profiles: ["telemetry"]
    image: signoz/signoz-otel-collector:latest
    container_name: orchicon-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      LOW_MEMORY_MODE: "true"
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/13133' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # SigNoz query-service — reads telemetry from ClickHouse and serves
  # the SigNoz UI (bundled frontend) on :3301 and the API on :8080.
  # The API is mapped to host :8081 to avoid clashing with the
  # Orchicon control plane on :8080.
  #
  # No hard depends_on on otel-collector — SigNoz will retry until
  # the collector is healthy and the schema is ready.
  signoz:
    profiles: ["telemetry"]
    image: signoz/signoz:latest
    container_name: orchicon-signoz
    command: ["--config=/root/config.yaml", "-DSTORAGE=clickhouse"]
    environment:
      CLICKHOUSE_USER: signoz
      CLICKHOUSE_PASSWORD: signoz
      SIGNOZ_TOKENIZER_JWT_SECRET: "dev-secret-not-for-production"
    volumes:
      - ./signoz-config.yaml:/root/config.yaml:ro
      - signoz-data:/var/lib/signoz
    ports:
      - "3301:8080"   # SigNoz UI + API (frontend bundled, remapped to avoid control-plane clash on :8080)
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 30
    restart: unless-stopped

volumes:
  postgres-data:
  nats-data:
  clickhouse-data:
  signoz-data:
