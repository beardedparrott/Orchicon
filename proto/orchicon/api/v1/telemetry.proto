// Orchicon Telemetry entity (docs/08_Event_Bus_and_Telemetry_Model.md §5,
// docs/07_API_Specification.md §3.9).
//
// Telemetry is OTel-native and flows from the producer to the OTel
// collector to SigNoz (ClickHouse-backed) — it does NOT flow through
// NATS (docs/08 §1). The TelemetryService proxies tenant-scoped queries
// to SigNoz so users explore traces/metrics/logs without leaving the
// Orchicon shell (docs/10 §11: seamless SigNoz embedding).
//
// A single correlation_id propagates across all spans in a user action
// (docs/08 §3, §5.1): api.<service>.<rpc> → reconcile.<kind>.<id> →
// dispatch.<task_id> → adapter.execute.<execution_id> →
// gateway.<provider>.<model>.request. The OTel Link mechanism ties a
// recovery span to its originating failed execution span without forcing
// them into one trace (docs/08 §5.1).
syntax = "proto3";

package orchicon.api.v1;

import "google/protobuf/timestamp.proto";

// TelemetrySignal enumerates the OTel signal types
// (docs/08 §5: traces, metrics, logs).
enum TelemetrySignal {
  TELEMETRY_SIGNAL_UNSPECIFIED = 0;
  TELEMETRY_SIGNAL_TRACES = 1;
  TELEMETRY_SIGNAL_METRICS = 2;
  TELEMETRY_SIGNAL_LOGS = 3;
}

// TraceSpan is a single OTel span projected from SigNoz/ClickHouse
// (docs/08 §5.1). Spans carry the canonical attributes
// (tenant_id, project_id, correlation_id) so tenant-scoped queries are
// enforced at the proxy boundary (AGENTS.md tenant isolation).
message TraceSpan {
  string trace_id = 1;
  string span_id = 2;
  string parent_span_id = 3;
  string name = 4;            // canonical span name (docs/08 §5.1)
  string service = 5;         // producer service
  int64 duration_us = 6;      // duration in microseconds
  google.protobuf.Timestamp start_time = 7;
  google.protobuf.Timestamp end_time = 8;
  map<string, string> attributes = 9; // includes tenant_id, project_id, correlation_id
  repeated TraceLink links = 10;
  int32 status_code = 11;     // OTel status code (0=unset,1=ok,2=error)
  string status_message = 12;
}

// TraceLink is an OTel Link — ties a recovery span to its originating
// failed execution span without forcing them into one trace
// (docs/08 §5.1).
message TraceLink {
  string trace_id = 1;
  string span_id = 2;
  map<string, string> attributes = 3;
}

// Trace is a complete trace (a tree of spans) joined by trace_id.
message Trace {
  string trace_id = 1;
  string root_span_name = 2;
  google.protobuf.Timestamp start_time = 3;
  int64 duration_us = 4;
  int32 span_count = 5;
  repeated TraceSpan spans = 6;
  map<string, string> root_attributes = 7; // tenant_id, project_id, correlation_id
}

// MetricPoint is a single metric sample projected from SigNoz.
message MetricPoint {
  string metric_name = 1;     // e.g. orchicon_tokens_consumed (docs/08 §5.2)
  google.protobuf.Timestamp timestamp = 2;
  double value = 3;
  map<string, string> labels = 4; // tenant, project, worker, provider, model
}

// MetricSeries is a named metric over a time window with its points.
message MetricSeries {
  string metric_name = 1;
  map<string, string> labels = 2;
  google.protobuf.Timestamp start = 3;
  google.protobuf.Timestamp end = 4;
  repeated MetricPoint points = 5;
}

// LogRecord is a structured OTel log record carrying trace_id +
// correlation_id (docs/08 §5.3).
message LogRecord {
  string trace_id = 1;
  string span_id = 2;
  google.protobuf.Timestamp timestamp = 3;
  string severity = 4;       // TRACE|DEBUG|INFO|WARN|ERROR|FATAL
  string body = 5;            // the log message
  string service = 6;
  map<string, string> attributes = 7; // tenant_id, correlation_id
}

// TelemetryQuery is the tenant-scoped query filter shared by traces,
// metrics, and logs. The proxy injects tenant_id from the request
// context so a client cannot read another tenant's telemetry
// (AGENTS.md tenant isolation).
message TelemetryQuery {
  string tenant_id = 1;       // injected from request context; client hint ignored
  string project_id = 2;      // optional scope
  string execution_id = 3;    // optional scope (joins via attributes)
  string trace_id = 4;        // optional: fetch a single trace
  string correlation_id = 5;  // optional: filter by correlation_id attribute
  string service = 6;         // optional: filter by producer service
  google.protobuf.Timestamp start = 7;  // time window start
  google.protobuf.Timestamp end = 8;     // time window end
  int32 limit = 9;            // max results (bounded at the handler)
  string page_token = 10;    // opaque pagination cursor
}
