// Orchicon WorkItem entity (docs/02_Domain_Model.md §2.2).
//
// The work hierarchy is Epic → Feature → Task → Subtask; all four
// share a common WorkItem base. Dependencies are edges in a DAG, not
// parent-child links. Only Tasks and Subtasks are schedulable.
syntax = "proto3";

package orchicon.api.v1;

import "google/protobuf/timestamp.proto";

// WorkItemKind enumerates the four levels of the work hierarchy
// (docs/02_Domain_Model.md §2.2). Depth is constrained to 4 levels.
enum WorkItemKind {
  WORK_ITEM_KIND_UNSPECIFIED = 0;
  WORK_ITEM_KIND_EPIC = 1;
  WORK_ITEM_KIND_FEATURE = 2;
  WORK_ITEM_KIND_TASK = 3;
  WORK_ITEM_KIND_SUBTASK = 4;
}

// WorkItem is the base entity of the work hierarchy. All four kinds
// share this shape; only Tasks and Subtasks are schedulable
// (docs/02_Domain_Model.md §2.2).
message WorkItem {
  string id = 1;
  string tenant_id = 2;
  string project_id = 3;
  string parent_id = 4; // empty for top-level (epic)
  WorkItemKind kind = 5;
  string title = 6;
  string description = 7;
  string acceptance_criteria = 8;
  WorkItemStatus status = 9;
  string assigned_worker_ref = 10; // JSON: {worker_id, version} (docs/02 §2.2)
  string workflow_id = 11;
  int32 priority = 12;
  string budgets = 13; // JSON: tokens/cost/time (docs/02 §2.2)
  int32 context_window = 14;
  string results = 15; // JSON: execution results
  // PR B (context propagation, PR-A follow-up): composite prompt the
  // worker should see when dispatched. Set by the WorkflowReconciler
  // before dispatch; read by the opencode adapter via the
  // TaskReconciler → manifest Goal. JSONB payload (see migration
  // 20260713210000): {"composite": "# Task\n...\n# Project context\n...\n# Upstream context\n..."}.
  string prompt_context = 19;
  int32 version = 16; // optimistic concurrency (docs/09 §5)
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

// WorkItemStatus — schedulable kinds follow:
// pending → ready → assigned → running → checkpointing →
// succeeded | failed | cancelled | recovering (docs/02 §2.2).
// Epics/Features use a subset (pending/succeeded/cancelled).
enum WorkItemStatus {
  WORK_ITEM_STATUS_UNSPECIFIED = 0;
  WORK_ITEM_STATUS_PENDING = 1;
  WORK_ITEM_STATUS_READY = 2;
  WORK_ITEM_STATUS_ASSIGNED = 3;
  WORK_ITEM_STATUS_RUNNING = 4;
  WORK_ITEM_STATUS_CHECKPOINTING = 5;
  WORK_ITEM_STATUS_SUCCEEDED = 6;
  WORK_ITEM_STATUS_FAILED = 7;
  WORK_ITEM_STATUS_CANCELLED = 8;
  WORK_ITEM_STATUS_RECOVERING = 9;
}

// WorkItemDependency is an edge in the work DAG. The scheduler treats
// the union of edges as a DAG; cycles are rejected at admission
// (docs/02_Domain_Model.md §2.2, docs/09 §3.2).
message WorkItemDependency {
  string id = 1;
  string tenant_id = 2;
  string project_id = 3;
  string from_id = 4; // work item that depends
  string to_id = 5; // work item that is depended upon
  DependencyType type = 6; // blocks | depends_on | relates_to
  google.protobuf.Timestamp created_at = 7;
}

enum DependencyType {
  DEPENDENCY_TYPE_UNSPECIFIED = 0;
  DEPENDENCY_TYPE_BLOCKS = 1;
  DEPENDENCY_TYPE_DEPENDS_ON = 2;
  DEPENDENCY_TYPE_RELATES_TO = 3;
}

// DependencyGraph is the full DAG for a project: nodes (work items)
// and edges (dependencies). Used by the frontend's read-only React
// Flow dependency graph (docs/10).
message DependencyGraph {
  repeated WorkItem nodes = 1;
  repeated WorkItemDependency edges = 2;
}
