// Orchicon Runtime Adapter contract.
//
// This is the gRPC sidecar contract between the Orchicon control plane
// and pluggable execution runtimes (docs/04_Runtime_Adapter_SDK.md §3).
// It lives in a separate package from the public API
// (orchicon.adapter.v1) because it has a different audience (adapter
// authors vs. API clients), different stability guarantees, and a
// different auth model (mTLS vs. OIDC/API keys) — docs/07 §10.
syntax = "proto3";

package orchicon.adapter.v1;

import "google/protobuf/timestamp.proto";

// Registration, lifecycle, and execution messages per docs/04 §2–3.
message RegisterRequest {
  string kind = 1;            // e.g. "opencode"
  string version = 2;         // semver
  string endpoint = 3;
  bytes capabilities = 4;     // JSON capability manifest
  int32 max_concurrent_executions = 5;
}

message RegisterResponse {
  string adapter_id = 1;
  google.protobuf.Timestamp registered_at = 2;
}

message DeregisterRequest {
  string adapter_id = 1;
}

message DeregisterResponse {}

message HeartbeatRequest {
  string adapter_id = 1;
  bytes health = 2; // JSON health snapshot
}

message HeartbeatResponse {
  bool acknowledged = 1;
}

// Bidirectional execution stream (docs/04 §3).
message ClientMessage {
  oneof payload {
    StartExecution start = 1;
    ControlCommand control = 2; // pause | resume | checkpoint | cancel
    ApprovalResponse approval = 3;
  }
}

message AdapterMessage {
  oneof payload {
    ExecutionStarted started = 1;
    bytes telemetry = 2;        // JSON telemetry signal
    bytes tool_call = 3;         // JSON tool-call event
    bytes checkpoint = 4;       // opaque checkpoint blob
    ApprovalRequest approval = 5;
    bytes health = 6;           // JSON health state
    ExecutionResult result = 7;  // terminal
    Error error = 8;            // terminal or transient
  }
}

message StartExecution {
  string execution_id = 1;
  string task_id = 2;
  string project_id = 3;
  string worker_id = 4;
  int32 worker_version = 5;
  string system_prompt = 6;
  string goal = 7;
  string acceptance_criteria = 8;
  string model_ref = 9;       // human-defined; no auto-failover (docs/05 §11)
  bytes context_sources = 10;  // JSON refs
  bytes continuation_plan = 11; // present on recovery resume (docs/06 §8)
  bytes budgets = 12;           // JSON token/cost/wall-clock ceilings
  bytes permissions = 13;       // JSON capability allowlist
  bytes capabilities_required = 14;
}

message ExecutionStarted {
  string execution_id = 1;
  bytes advertised_capabilities = 2; // re-asserted at start (docs/04 §3.2)
}

message ControlCommand {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_PAUSE = 1;
    ACTION_RESUME = 2;
    ACTION_CHECKPOINT = 3;
    ACTION_CANCEL = 4;
  }
  Action action = 1;
}

message ApprovalRequest {
  string request_id = 1;
  string tool_category = 2; // terminal | web_fetch | git (docs/05 §7.1)
  bytes detail = 3;          // JSON
}

message ApprovalResponse {
  string request_id = 1;
  bool approved = 2;
  string reason = 3;
}

message ExecutionResult {
  string execution_id = 1;
  bool succeeded = 2;
  bytes artifact_refs = 3; // JSON
}

message Error {
  string execution_id = 1;
  string message = 2;
  bool retryable = 3;
  string code = 4;
}

// RuntimeAdapterService is the gRPC sidecar contract between the
// Orchicon control plane and pluggable execution runtimes
// (docs/04_Runtime_Adapter_SDK.md §2–4). The adapter is a process the
// control plane drives over gRPC; adapters hold no durable state and
// never touch Postgres or NATS directly (docs/04 §1, §9).
service RuntimeAdapterService {
  // Register announces the adapter with its kind/version/capabilities.
  // Control plane records a RuntimeAdapter row and begins a heartbeat
  // lease (docs/04 §2).
  rpc Register(RegisterRequest) returns (RegisterResponse);

  // Deregister gracefully drains — new executions refused, in-flight
  // allowed to complete (docs/04 §2).
  rpc Deregister(DeregisterRequest) returns (DeregisterResponse);

  // Heartbeat renews the adapter's lease and carries a health snapshot
  // (docs/04 §2, docs/03 §5).
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Execute is one bidirectional stream per WorkerExecution
  // (docs/04 §3). Client messages (start/control/approval) go down;
  // adapter messages (telemetry/tool_call/checkpoint/result/error) come
  // up. All telemetry is dual-written: onto the stream (low-latency for
  // live UI) and onto NATS (durable) by the control plane
  // (docs/04 §4).
  rpc Execute(stream ClientMessage) returns (stream AdapterMessage);
}
